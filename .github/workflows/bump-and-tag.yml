name: Auto Version and Tag

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: auto-version-and-tag
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version-and-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Detect release-worthy changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "needs_tag=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            files="$(git ls-files)"
          else
            files="$(git diff --name-only "$before" "${{ github.sha }}")"
          fi

          printf 'Changed files:\n%s\n' "$files"

          if echo "$files" | grep -Eq '^(main\.go|go\.mod|go\.sum|conf\.sample\.yml)$|^internal/'; then
            echo "needs_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.changes.outputs.needs_tag == 'true'
        run: go build .

      - name: Test
        if: steps.changes.outputs.needs_tag == 'true'
        run: go test ./...

      - name: Vet
        if: steps.changes.outputs.needs_tag == 'true'
        run: go vet ./...

      - name: Compute next version
        if: steps.changes.outputs.needs_tag == 'true'
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force
          latest="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"

          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            if [[ ! "$latest" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "Unsupported tag format: $latest"
              exit 1
            fi
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            next="v${major}.${minor}.$((patch + 1))"
          fi

          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.changes.outputs.needs_tag == 'true'
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.next }}"
          if git rev-parse "refs/tags/$version" >/dev/null 2>&1; then
            echo "Tag $version already exists, skipping"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          cat > tag-message.txt <<EOF
          Release $version

          Source commit: ${{ github.sha }}
          Triggered by: ${{ github.actor }}
          Previous tag: ${{ steps.version.outputs.latest }}
          EOF

          git tag -a "$version" -F tag-message.txt
          git push origin "$version"
