name: Auto Version and Tag

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: auto-version-and-tag
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      needs_tag: ${{ steps.changes.outputs.needs_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Detect release-worthy changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "needs_tag=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            files="$(git ls-files)"
          else
            files="$(git diff --name-only "$before" "${{ github.sha }}")"
          fi

          printf 'Changed files:\n%s\n' "$files"

          if echo "$files" | grep -Eq '^(main\.go|go\.mod|go\.sum|conf\.sample\.yml)$|^internal/'; then
            echo "needs_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.changes.outputs.needs_tag == 'true'
        run: go build .

      - name: Test
        if: steps.changes.outputs.needs_tag == 'true'
        run: go test ./...

      - name: Vet
        if: steps.changes.outputs.needs_tag == 'true'
        run: go vet ./...

  tag:
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.needs_tag == 'true'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.next }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force
          latest="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"

          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            if [[ ! "$latest" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "Unsupported tag format: $latest"
              exit 1
            fi
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            next="v${major}.${minor}.$((patch + 1))"
          fi

          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.next }}"
          if git rev-parse "refs/tags/$version" >/dev/null 2>&1; then
            echo "Tag $version already exists, skipping"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          cat > tag-message.txt <<EOF
          Release $version

          Source commit: ${{ github.sha }}
          Triggered by: ${{ github.actor }}
          Previous tag: ${{ steps.version.outputs.latest }}
          EOF

          git tag -a "$version" -F tag-message.txt
          git push origin "$version"

  build-release:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: tag
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
            binary_name: dashyreborn
          - goos: linux
            goarch: arm64
            archive: tar.gz
            binary_name: dashyreborn
          - goos: darwin
            goarch: amd64
            archive: tar.gz
            binary_name: dashyreborn
          - goos: darwin
            goarch: arm64
            archive: tar.gz
            binary_name: dashyreborn
          - goos: windows
            goarch: amd64
            archive: zip
            binary_name: dashyreborn.exe
          - goos: windows
            goarch: arm64
            archive: zip
            binary_name: dashyreborn.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build archive
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ needs.tag.outputs.version }}
          ARCHIVE_FORMAT: ${{ matrix.archive }}
          BINARY_NAME: ${{ matrix.binary_name }}
        run: |
          set -euo pipefail

          package="dashyreborn_${VERSION}_${GOOS}_${GOARCH}"
          staging="dist/${package}"
          mkdir -p "$staging"

          go build -trimpath -ldflags "-s -w -X main.appVersion=${VERSION}" -o "$staging/$BINARY_NAME" .
          cp readme.md "$staging/README.md"
          cp conf.sample.yml "$staging/conf.sample.yml"

          mkdir -p dist/out
          if [ "$ARCHIVE_FORMAT" = "zip" ]; then
            (
              cd dist
              zip -rq "out/${package}.zip" "${package}"
            )
          else
            tar -C dist -czf "dist/out/${package}.tar.gz" "${package}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/out/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - tag
      - build-release
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist/artifacts
          sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.version }}
          generate_release_notes: true
          files: |
            dist/artifacts/*
