name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
            binary_name: dashyreborn
          - goos: linux
            goarch: arm64
            archive: tar.gz
            binary_name: dashyreborn
          - goos: darwin
            goarch: amd64
            archive: tar.gz
            binary_name: dashyreborn
          - goos: darwin
            goarch: arm64
            archive: tar.gz
            binary_name: dashyreborn
          - goos: windows
            goarch: amd64
            archive: zip
            binary_name: dashyreborn.exe
          - goos: windows
            goarch: arm64
            archive: zip
            binary_name: dashyreborn.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          else
            version="dev-${GITHUB_SHA::7}"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Build archive
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ steps.version.outputs.value }}
          ARCHIVE_FORMAT: ${{ matrix.archive }}
          BINARY_NAME: ${{ matrix.binary_name }}
        run: |
          set -euo pipefail

          package="dashyreborn_${VERSION}_${GOOS}_${GOARCH}"
          staging="dist/${package}"
          mkdir -p "$staging"

          go build -trimpath -ldflags "-s -w -X main.appVersion=${VERSION}" -o "$staging/$BINARY_NAME" .
          cp readme.md "$staging/README.md"
          cp conf.sample.yml "$staging/conf.sample.yml"

          mkdir -p dist/out
          if [ "$ARCHIVE_FORMAT" = "zip" ]; then
            (
              cd dist
              zip -rq "out/${package}.zip" "${package}"
            )
          else
            tar -C dist -czf "dist/out/${package}.tar.gz" "${package}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/out/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist/artifacts
          sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/artifacts/*
