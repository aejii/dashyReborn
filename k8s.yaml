apiVersion: v1
kind: ConfigMap
metadata:
  name: dashy-config-map
data:
  conf.yml: |
    pageInfo:
      title: Sample Dashboard
      description: Example config for Dashy Reborn
      navLinks:
        - title: Repository
          path: https://github.com/aejii/dashyReborn
          target: newtab

    appConfig:
      theme: dracula
      language: en
      iconSize: medium
      layout: auto
      defaultOpeningMethod: newtab

    sections:
      - name: Infrastructure
        icon: mdi-server
        items:
          - title: Grafana
            description: Metrics and dashboards
            url: https://grafana.com/
            icon: si-grafana
          - title: Prometheus
            description: Time-series database
            url: https://prometheus.io/
            icon: favicon

      - name: Productivity
        icon: mdi-briefcase
        items:
          - title: Documentation
            description: Internal docs portal
            url: https://docs.example.com
            icon: mdi-file-document-outline
          - title: Tickets
            description: Work tracking
            url: https://tickets.example.com
            icon: generative
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashyreborn-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashyreborn
  template:
    metadata:
      labels:
        app: dashyreborn
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: dashyreborn
        image: aejii/dashyreborn:1.0.0
        ports:
        - containerPort: 8080
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        startupProbe:
          httpGet:
            path: /healthz
            port: 8080
          periodSeconds: 2
          timeoutSeconds: 2
          failureThreshold: 15
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          periodSeconds: 20
          timeoutSeconds: 2
          failureThreshold: 3
        volumeMounts:
          - mountPath: /app/conf.sample.yml
            name: dashyreborn-data
            subPath: conf.sample.yml
            readOnly: true
          - mountPath: /app/.cache/favicons
            name: dashyreborn-cache
        resources:
          requests:
            cpu: "5m"
            memory: "64Mi"
          limits:
            cpu: "50m"
            memory: "128Mi"
      volumes:
        - name: dashyreborn-data
          configMap:
            name: dashy-config-map
            items:
            - key: conf.yml
              path: conf.sample.yml
        - name: dashyreborn-cache
          emptyDir: {}
